# api/worker/wrangler.toml
name = 'fontsource-api'
main = "worker/src/index.ts"
compatibility_date = "2026-05-10"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "METADATA", id = "49e9d329349446cf948f84af9828914f" },
]

r2_buckets = [
  { binding = "FONTS", bucket_name = "fontsource-artifacts" },
]

[[durable_objects.bindings]]
name = "ARTIFACT_BUILDER"
class_name = "ArtifactBuilder"

[[migrations]]
tag = "artifact-builder-v1"
new_sqlite_classes = ["ArtifactBuilder"]

[[containers]]
class_name = "ArtifactBuilder"
image = "./container/Dockerfile"
image_build_context = "../.."
instance_type = "standard-1"

[cache]
enabled = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = false

[triggers]
crons = ["0 */3 * * *"]

[vars]
FONTS_BUCKET_NAME = "fontsource-artifacts"
