name: Release API

on:
  push:
    branches:
      - main
    paths:
      - "api/worker/**"
      - "packages/core/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/release-api.yml"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository == 'fontsource/fontsource'
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Deploy Cloudflare Workers
        run: bun run ci:deploy-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
