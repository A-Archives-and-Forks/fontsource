name: API Tests
on:
  pull_request:
    branches: [main]
    paths:
      - "api/worker/**"
      - "packages/core/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/tests-api.yml"

  push:
    branches: [main]
    paths:
      - "api/worker/**"
      - "packages/core/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/tests-api.yml"

jobs:
  worker:
    name: Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/worker

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Check generated website API client
        run: |
          bun run generate:website-client
          git diff --exit-code -- ../../website/app/generated/api

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Run build
        run: bun run build
